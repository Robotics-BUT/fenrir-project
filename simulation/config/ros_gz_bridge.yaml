# ros_gz_bridge configuration for the Fenrir sim (Phase 4).
#
# Translates the Gazebo Harmonic topics published by the URDF/sensor
# plugins into the /bpc_prp_robot/* names the real robot exposes.
#
# Topics NOT in this file (because they need custom logic, not 1:1):
#   /bpc_prp_robot/set_motor_speeds  →  /cmd_vel
#       handled by fenrir_sim/motor_bridge.py
#   /bpc_prp_robot/line_sensors
#       handled by fenrir_sim/line_sensor_bridge.py — it consumes the
#       /internal/floor_camera image bridged below and samples two pixels.
#   /bpc_prp_robot/encoders
#       handled by fenrir_sim/encoder_bridge.py — derives from gz joint_states.
#   /bpc_prp_robot/ultrasounds
#       handled by fenrir_sim/ultrasound_bridge.py — aggregates the three
#       /internal/us_* LaserScan fans bridged below into a UInt8MultiArray[3].
#   /bpc_prp_robot/buttons
#       handled by fenrir_sim/button_bridge.py — interactive keyboard
#       reader (run from a TTY, not from launch).
#   /bpc_prp_robot/rgb_leds
#       handled by fenrir_sim/rgb_leds_bridge.py — sink that mirrors the
#       LED state to RViz markers (no gz actuator exists).
#   /bpc_prp_robot/current_probes
#       Stub for later (power-monitor topic; not modelled in sim).

# ---- Lidar (RPLiDAR A1) -----------------------------------------------------
# Bridge gz to an /internal/ topic; the lidar_bridge node then transforms it
# to the Fenrir-mounting CW convention and republishes /bpc_prp_robot/lidar.
- ros_topic_name: "/internal/lidar"
  gz_topic_name:  "/lidar"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan"
  direction:      GZ_TO_ROS

# ---- Ultrasounds (3× narrow-fan gpu_lidar, consumed by ultrasound_bridge) ---
# Each is a ±30° fan of rays; the bridge takes the minimum distance per fan
# and packs the 3 values into /bpc_prp_robot/ultrasounds (UInt8MultiArray[3]).
- ros_topic_name: "/internal/us_front"
  gz_topic_name:  "/us_front"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan"
  direction:      GZ_TO_ROS

- ros_topic_name: "/internal/us_left"
  gz_topic_name:  "/us_left"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan"
  direction:      GZ_TO_ROS

- ros_topic_name: "/internal/us_right"
  gz_topic_name:  "/us_right"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan"
  direction:      GZ_TO_ROS

# ---- RGB LED colours (recolour the 4 LED cubes in the Gazebo scene) ---------
# rgb_leds_bridge.py turns /bpc_prp_robot/rgb_leds into 4 MaterialColor
# messages (one per LED, addressed by visual name) on /led_colors; the
# LedMaterialColor gz-sim system applies them to the led_* cube visuals.
- ros_topic_name: "/led_colors"
  gz_topic_name:  "/led_colors"
  ros_type_name:  "ros_gz_interfaces/msg/MaterialColor"
  gz_type_name:   "gz.msgs.MaterialColor"
  direction:      ROS_TO_GZ

# ---- Camera (640x480, bgr8) -------------------------------------------------
- ros_topic_name: "/bpc_prp_robot/camera"
  gz_topic_name:  "/camera"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction:      GZ_TO_ROS

- ros_topic_name: "/bpc_prp_robot/camera/camera_info"
  gz_topic_name:  "/camera_info"
  ros_type_name:  "sensor_msgs/msg/CameraInfo"
  gz_type_name:   "gz.msgs.CameraInfo"
  direction:      GZ_TO_ROS

# ---- Internal floor camera (consumed by line_sensor_bridge) ----------------
# Not part of the /bpc_prp_robot/* contract -- students should not rely on it.
- ros_topic_name: "/internal/floor_camera"
  gz_topic_name:  "/internal/floor_camera"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction:      GZ_TO_ROS

# ---- IMU (MPU6050) ----------------------------------------------------------
- ros_topic_name: "/bpc_prp_robot/imu"
  gz_topic_name:  "/imu"
  ros_type_name:  "sensor_msgs/msg/Imu"
  gz_type_name:   "gz.msgs.IMU"
  direction:      GZ_TO_ROS

# ---- Differential-drive plumbing (internal, not in the robot contract) ------
- ros_topic_name: "/cmd_vel"
  gz_topic_name:  "/cmd_vel"
  ros_type_name:  "geometry_msgs/msg/Twist"
  gz_type_name:   "gz.msgs.Twist"
  direction:      ROS_TO_GZ

- ros_topic_name: "/odom"
  gz_topic_name:  "/odom"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction:      GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name:  "/joint_states"
  ros_type_name:  "sensor_msgs/msg/JointState"
  gz_type_name:   "gz.msgs.Model"
  direction:      GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name:  "/tf"
  ros_type_name:  "tf2_msgs/msg/TFMessage"
  gz_type_name:   "gz.msgs.Pose_V"
  direction:      GZ_TO_ROS

- ros_topic_name: "/clock"
  gz_topic_name:  "/clock"
  ros_type_name:  "rosgraph_msgs/msg/Clock"
  gz_type_name:   "gz.msgs.Clock"
  direction:      GZ_TO_ROS
